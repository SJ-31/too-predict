out:
  root: "../data/output"
  repos: "../remote/repos/too-predict"
  test_repos: "../data/tests"
  optuna:
    storage: "optuna_journals"
    artifacts: "optuna_artifactstore"
scripts: "../scripts"

test: False
dev_run: False
do_cv: True
do_holdout: True

cv_n_repeats: 3 # Number of times to repeat cross validation
multi_labels: ["Sample_Type", "tumor_type"]

# * Default parameters
defaults: # TODO: fill these in
  dl:
    feature_set: "edgeR_median_lfc_feature_list_3000"
    filter: True
    device: "cuda:0"
    # matmul_precision: "high"
    matmul_precision: "none"
    early_stop:
      monitor: "val_loss"
      patience: 40
      mode: "min" # When "min", training stops when the quantity in "monitor"
      # stops decreasing. Vice versa for "max"
    cv:
      batch_size: 512
      n_splits: 5
    optimizer:
      lr: 0.001
    schedule:
      patience: 40
    trainer:
      max_epochs: 1000
      enable_progress_bar: False
      log_every_n_steps: 10
      precision: "32-true"
      # precision: "16-mixed"

    # ** For hpo
    hpo:
      module: Disyak
      dropout: 0.2
      l2_pars: none
      task_weights: 1
      l1_pars: none
      n_hidden: none
      optimizer: Adam
      betas: none
      amsgrad: False
      weight_decay: 0.001
      momentum: 0
      transformer: -1
      filter: -1
      scheduler: ReduceLROnPlateau
      power: 0.5
      total_iters: 5
      patience: 4
      factor: 0.1
      mode: none
  shallow:
    feature_set: "edgeR_median_lfc_feature_list_3000"
    feature_col: "GENEID"
    transform: "clr"
    imputation: "plus_one"

# * Models to run
models:
  dl:
    MultiLevel:
      filter: True
    MtcLR:
      filter: True
    Disyak:
      filter: True
      params:
        n_hidden: 1000
        dropout_p: 0.2
    Disyak_All:
      filter: True
      params:
        n_hidden: 3000
        dropout_p: 0.2
