out:
  root: "../data/output"
  repos: "../remote/repos/too-predict"
  test_repos: "../data/tests"
  optuna:
    storage: "optuna_journals"
    artifacts: "optuna_artifactstore"
scripts: "../scripts"

test: False
dev_run: False
do_cv: True
do_holdout: False
do_kd: False # Whether to use knowledge distillation for training

record_norm: True

cv_n_repeats: 3 # Number of times to repeat cross validation
multi_labels: ["Sample_Type", "tumor_type"] # List of prediction labels
# at least one

obs_filters: # If provided, filter dataset to have only the given elements of obs
  tumor_type: []
  # Sample_Type: []

# * Default parameters
dl:
  feature_set: "edgeR_median_lfc_feature_list_3000"
  filter: True
  device: "cuda:0"
  dataloader:
    batch_size: 256
    shuffle: True

  # matmul_precision: "high"
  matmul_precision: "none"
  # [2025-07-31 Thu] Disable all callbacks until you can overfit train
  callbacks:
    early_stop:
      enabled: False
      params:
        monitor: val_loss
        patience: 40
        mode: min # When "min", training stops when the quantity in "monitor"
    # stops decreasing. Vice versa for "max"
    average_best:
      enabled: False
      params:
        n_best: 5
        target: val_acc
  cv:
    init_bias: False # TODO: You can make this a hyperparam
    batch_size: 512
    n_splits: 3
    grad_accumulation: False # WARNING: [2025-08-15 Fri] only use this as  a last resort,
    # it looked to have made a difference when testing with small datasets
    grad_accumulation_batch_size: 256
  optimizer:
    lr: 0.001
  schedule:
    patience: 0 # Recommended by [1]
  # ** Trainer
  trainer:
    max_epochs: 200 # From personal communication
    # Gradient clipping
    gradient_clip_val: 0 # 0 = no clip
    gradient_clip_algorithm: norm # Either norm or value
    enable_progress_bar: False
    log_every_n_steps: 10
    accelerator: "cuda"
    precision: "32-true"
    num_sanity_val_steps: 0 # Required by BranchNet or any other model that needs
    # an "on_train_start" callback that uses the training data
    # precision: "16-mixed"

  # ** For hpo
  hpo:
    module: Disyak
    dropout: 0.2
    n_epochs: 40
    l2_pars: none
    scaler: none
    task_weights: 1
    l1_pars: none
    n_hidden: none
    optimizer: Adam
    betas: ["literal", [0.9, 0.999]]
    amsgrad: False
    weight_decay: 0.001
    momentum: 0.9
    transformer: -1
    filter: -1
    callbacks: []
    scheduler: ReduceLROnPlateau
    power: 0.5
    total_iters: 5
    patience: 4
    factor: 0.1
    mode: none
shallow:
  filter:
    feature_set: "edgeR_median_lfc_feature_list_3000"
    feature_col: "GENEID"
    label_col: "tumor_type"
  transformer:
    method: "clr"
    impute_fn: "plus_one"

# * Model definitions
run_only: [] # Use this key to specify which models to run, outside of "skip"

# s_params are shared parameters, attributes of ModuleConfig. params are model-specific parameters
models:
  dl:
    MultiLevel:
      filter: True
      skip: True
    MtcLR:
      filter: True
      skip: True
    Disyak:
      filter: True
      skip: True
      s_params:
        dropout_p: 0.2
      params:
        n_hidden: 1000
    Disyak_Weighted:
      filter: True
      skip: True
      transform: True
      s_params:
        dropout_p: 0.2
        task_weights: [1, 2]
      params:
        n_hidden: 1000
    Parallel:
      skip: True
      filter: True
      transform: True
      s_params:
        dropout_p: 0.2
      params:
        n_shared_layers: 2
        n_layers_per_task: [2, 2]
    Parallel_Deep:
      skip: False
      filter: True
      transform: True
      s_params:
        dropout_p: 0.2
      params:
        n_shared_layers: 3
        n_layers_per_task: [3, 3]
    Disyak_All:
      filter: True
      skip: False
      transform: True
      s_params:
        dropout_p: 0.2
    baseline:
      skip: True
      filter: True
      transform: True
    MultiBranch:
      filter: True
      transform: True
      skip: False
    MultiBranch_Sep:
      filter: True
      transform: True
      skip: True
      params:
        fit_separately: True
        fit_separately_kwargs:
          epochs: 200

# * Data augmentation
data_augmentation:
  # ** Subsets
  subsets: # Map of name -> data_spec
    # data_spec is a map of keys in adata.obs to a map of allowed values->match_type
    # match_type == contains means to use Series.str.contains to match on the obs key
    chula:
      Project_ID:
        CHULA: contains
    imbalanced: # 3 most and 3 least abundant tumor types, plus 3 medium abundance
      # to check if imbalance hinders classification (it should), and if augmentation can resolve that
      # Only within TCGA to remove batch effects
      tumor_type:
        BRCA: exact
        COAD-READ: exact
        LUAD: exact
        GBM: exact
        LIHC: exact
        CESC: exact
        CHOL: exact
        DLBC: exact
        UCS: exact
      Project_ID:
        TCGA: contains
    organoid:
      Sample_Type:
        organoid: exact
    # ** Augmentations
  augmentations:
    baseline: null
    SMOTE:
      params:
      enabled: True
    undersample:
    oversample:
    noisy:
# * Literature references
# [1] Wilson, A. C., Roelofs, R., Stern, M., Srebro, N., & Recht, B. (2018). The Marginal Value of Adaptive Gradient Methods in Machine Learning (No. arXiv:1705.08292). arXiv. https://doi.org/10.48550/arXiv.1705.08292
