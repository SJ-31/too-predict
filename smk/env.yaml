out:
  root: "../data/output"
  repos: "../remote/repos/too-predict"
  test_repos: "../data/tests"
  optuna:
    storage: "optuna_journals"
    artifacts: "optuna_artifactstore"
scripts: "../scripts"

test: False
dev_run: False
do_cv: True
do_holdout: False

cv_n_repeats: 3 # Number of times to repeat cross validation
multi_labels: ["Sample_Type", "tumor_type"]

dataset_filters: # If provided, filter dataset to have only the elements of obs in these
  # files
  tumor_type: ""
  # Sample_Type: []

# * Default parameters
dl:
  feature_set: "edgeR_median_lfc_feature_list_3000"
  filter: True
  device: "cuda:0"
  dataloader:
    batch_size: 256
    shuffle: True

  # matmul_precision: "high"
  matmul_precision: "none"
  # [2025-07-31 Thu] Disable all callbacks until you can overfit train
  callbacks:
    early_stop:
      enabled: False
      params:
        monitor: val_loss
        patience: 40
        mode: min # When "min", training stops when the quantity in "monitor"
    # stops decreasing. Vice versa for "max"
    average_best:
      enabled: False
      params:
        n_best: 5
        target: val_acc
  cv:
    batch_size: 512
    n_splits: 3
  optimizer:
    lr: 0.001
  schedule:
    patience: 0 # Recommended by [1]
  # ** Trainer
  trainer:
    max_epochs: 200 # From personal communication
    # Gradient clipping
    gradient_clip_val: 0 # 0 = no clip
    gradient_clip_algorithm: norm # Either norm or value
    enable_progress_bar: False
    log_every_n_steps: 10
    accelerator: "gpu"
    precision: "32-true"
    num_sanity_val_steps: 0 # Required by BranchNet or any other model that needs
    # an "on_train_start" callback that uses the training data
    # precision: "16-mixed"

  # ** For hpo
  hpo:
    module: Disyak
    dropout: 0.2
    n_epochs: 40
    l2_pars: none
    scaler: none
    task_weights: 1
    l1_pars: none
    n_hidden: none
    optimizer: Adam
    betas: ["literal", [0.9, 0.999]]
    amsgrad: False
    weight_decay: 0.001
    momentum: 0.9
    transformer: -1
    filter: -1
    callbacks: []
    scheduler: ReduceLROnPlateau
    power: 0.5
    total_iters: 5
    patience: 4
    factor: 0.1
    mode: none
shallow:
  feature_set: "edgeR_median_lfc_feature_list_3000"
  feature_col: "GENEID"
  transform: "clr"
  imputation: "plus_one"

# * Models to run
models:
  dl:
    MultiLevel:
      filter: True
      skip: True
    MtcLR:
      filter: True
      skip: True
    Disyak:
      filter: True
      skip: True
      params:
        n_hidden: 1000
        dropout_p: 0.2
    Disyak_Weighted:
      filter: True
      skip: True
      transform: True
      params:
        n_hidden: 1000
        dropout_p: 0.2
        task_weights: [1, 2]
    Parallel:
      skip: True
      filter: True
      transform: True
      params:
        dropout_p: 0.2
        n_shared_layers: 2
        n_layers_per_task: [2, 2]
    Parallel_Deep:
      skip: True
      filter: True
      transform: True
      params:
        n_shared_layers: 3
        dropout_p: 0.2
        n_layers_per_task: [3, 3]
    Disyak_All:
      filter: True
      skip: True
      transform: True
      params:
        dropout_p: 0.2
    baseline:
      skip: True
      filter: True
      transform: True
    MultiBranch:
      filter: True
      transform: True
      skip: False
    MultiBranch_Sep:
      filter: True
      transform: True
      skip: False
      params:
        fit_separately: True
        fit_separately_kwargs:
          epochs: 200
# * Literature references
# [1] Wilson, A. C., Roelofs, R., Stern, M., Srebro, N., & Recht, B. (2018). The Marginal Value of Adaptive Gradient Methods in Machine Learning (No. arXiv:1705.08292). arXiv. https://doi.org/10.48550/arXiv.1705.08292
