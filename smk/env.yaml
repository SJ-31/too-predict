out:
  root: "../data/output"
  repos: "../remote/repos/too-predict"
scripts: "../scripts"

test: false
do_cv: true
do_holdout: true

cv_n_repeats: 3 # Number of times to repeat cross validation
multi_labels: ["Sample_Type", "tumor_type"]

# * Default parameters
defaults: # TODO: fill these in
  dl:
    feature_set: "edgeR_median_lfc_feature_list_3000"
    early_stop:
      monitor: "val_loss"
      patience: 40
      mode: "max"
    cv:
      batch_size: 512
      n_splits: 5
    schedule:
      patience: 40
    trainer: # Lightning trainer
      max_epochs: 1000
      enable_progess_bar: false
      log_every_n_steps: 10
    optimization:
      lr: 0.001
  shallow:
    feature_set: "edgeR_median_lfc_feature_list_3000"
    feature_col: "GENEID"
    transform: "clr"
    imputation: "plus_one"

# * Models to run
models:
  dl:
    MultiLevel:
      filter: true
    MtcLR:
      filter: true
    Disyak:
      filter: true
      params:
        n_hidden: 1000
        dropout_p: 0.2
    Disyak_All:
      filter: true
      params:
        n_hidden: 3000
        dropout_p: 0.2
